<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - RentLink</title>
  <link rel="stylesheet" href="../Assets/CSS/main-style.css" />
  <link rel="stylesheet" href="../Assets/CSS/navigation.css" />
  <link rel="stylesheet" href="../Assets/CSS/sign and log.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">
        <div class="logo-mark">RL</div>
        <span class="logo-name">Rent<span>Link</span></span>
      </a>
        <nav class="main-nav">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">About us</a>
        <a href="#" class="nav-link">Contact us</a>
      </nav>
      <div class="nav-right">
        <a href="signup.html" class="nav-link ">Login</a>
        <a href="login.html"  class="nav-link active">Sign In</a>
      </div>
    </div>
  </header>

  <main class="page-wrapper">
    <div class="auth-container fade-up" style="max-width: 600px;">
      <div class="auth-card">
        <div class="auth-header">
          <span class="role-badge tenant">Tenant Application</span>
          <h2>Create Your Account</h2>
          <p>Please provide your details below</p>
        </div>

        <form id="signupForm">
          <div class="section-label">Personal Information</div>
          <div class="grid-3" style="margin-bottom: 1rem;">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" id="fname" class="form-control" placeholder="john" required>
            </div>
            <div class="form-group">
              <label>Middle Name</label>
              <input type="text" id="mname" placeholder="Quincy" class="form-control">
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="lname" class="form-control" placeholder="Doe" required>
            </div>
          </div>

          <div class="grid-3" style="margin-bottom: 1rem;">
            <div class="form-group">
              <label>Birth Date</label>
              <input type="date" id="dob" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Age</label>
              <input type="number" id="age" class="form-control" readonly placeholder="--">
            </div>
            <div class="form-group">
              <label>Civil Status</label>
              <select class="form-control" required>
                <option value="">Select...</option>
                <option value="single">Single</option>
                <option value="married">Married</option>
              </select>
            </div>
          </div>

          <div class="section-label">Verification & Finance</div>
          <div class="form-group">
            <label>Upload Valid ID</label>
            <input type="file" class="form-control" accept="image/*" required>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>Occupation</label>
              <select class="form-control" required>
                <option value="employed">Employed</option>
                <option value="undergrad">Undergraduate</option>
                <option value="unemployed">Unemployed</option>
              </select>
            </div>
            <div class="form-group">
              <label>Monthly Income/Allowance</label>
              <input type="number" class="form-control" placeholder="₱" required>
            </div>
          </div>

          <div class="section-label">Account Security</div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="form-control" placeholder="name@email.com" required>
          </div>

           <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" required>
          </div>

          <div class="form-group" style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
            <input type="checkbox" id="terms" required>
           <label for="terms" style="margin-bottom: 0; font-size: 0.75rem;">I agree to the <a href="#" class="auth-link">Terms of Service</a></label>
          </div>
      

          <button type="submit" class="btn-auth"><a href="login.html">Register</a></button>
        </form>
        <div class="auth-footer">
          <p>Already have an account? <a href="login.html" class="auth-link">Sign In</a></p>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <div class="footer-brand-dot"></div>
        <span class="footer-copy">© 2026 RentLink Portal · Block A · All rights reserved</span>
      </div>
      <div class="footer-links">
        <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Support</a>
      </div>
    </div>
  </footer>

  <script>
    // FRONT-END ONLY: Age Calculation
    document.getElementById('dob').addEventListener('change', function() {
      const birthDate = new Date(this.value);
      const today = new Date();
      let age = today.getFullYear() - birthDate.getFullYear();
      if (today.getMonth() < birthDate.getMonth() || (today.getMonth() === birthDate.getMonth() && today.getDate() < birthDate.getDate())) {
        age--;
      }
      document.getElementById('age').value = age >= 0 ? age : 0;
    });

    // FRONT-END ONLY: Submission Guard
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      const ageValue = parseInt(document.getElementById('age').value);
      if (ageValue < 18) {
        e.preventDefault();
        alert("Verification Error: You must be 18 or older.");
      } else {
        alert("Success: Front-end validation passed!");
      }
    });
  </script>

</body>
</html>
